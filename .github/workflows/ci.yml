name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint:ci
      - name: TypeScript
        run: pnpm type-check
      - name: Tests
        run: pnpm test:ci
      - name: Build
        run: pnpm build
